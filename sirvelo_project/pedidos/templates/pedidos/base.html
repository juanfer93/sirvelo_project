<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap CDN para diseño profesional sin escribir CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block titulo %}Sírvelo - Gestión de Pedidos{% endblock %}</title>
</head>
<body class="bg-light">
    <!-- Menú de navegación (Navbar) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'pedidos:listar' %}">SÍRVELO</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pedidos:listar' %}">Ver Pedidos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pedidos:listar_meseros' %}">Meseros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'pedidos:listar_metodos_pago' %}">Métodos de Pago</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Bloque donde se insertará el contenido de las otras páginas -->
        {% block contenido %}{% endblock %}
    </div>

    <footer class="text-center mt-5 py-3 text-muted">
        <p>&copy; 2026 Proyecto Sírvelo - ADSO</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
